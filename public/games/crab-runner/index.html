<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crab Runner</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container">
    <div id="start-screen" class="screen">
      <h1>Crab Runner 🦀</h1>
      <p>Appuie sur ESPACE ou clique pour sauter !</p>
      <button id="start-btn" class="btn">Jouer</button>
    </div>

    <div id="game-over-screen" class="screen hidden">
      <h2>Game Over</h2>
      <p>Score : <span id="final-score">0</span></p>
      <button id="restart-btn" class="btn">Rejouer</button>
      <div id="submit-status">Enregistrement du score...</div>
    </div>

    <div id="hud" class="hidden">
      Score : <span id="score">0</span>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>
  </div>

  <script src="game.js"></script>
</body>
</html>
